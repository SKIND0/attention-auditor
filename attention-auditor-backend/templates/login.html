<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attention Auditor — Sign in</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function () {
            var k = "aa-theme", t = localStorage.getItem(k);
            document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
        })();
    </script>
    <style>
        [data-theme="light"] {
            --bg: #f7f4f0;
            --card-bg: #fffdfb;
            --card-border: #e8e2db;
            --card-shadow: 0 4px 24px rgba(61, 54, 48, 0.06);
            --text: #3d3630;
            --muted: #8a7f75;
            --accent: #6b8fa8;
            --accent-hover: #567a94;
            --distracting: #c47d7d;
            --input-bg: #f3efe8;
        }
        [data-theme="dark"] {
            --bg: #1f1c19;
            --card-bg: #2a2622;
            --card-border: #3d3832;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            --text: #f5f0e8;
            --muted: #a89f94;
            --accent: #8ab4c7;
            --accent-hover: #9fc3d4;
            --distracting: #d49292;
            --input-bg: #242019;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            transition: background 0.25s ease, color 0.2s ease;
        }
        [data-theme="light"] body {
            background-image:
                radial-gradient(ellipse 70% 50% at 20% 0%, rgba(183, 220, 200, 0.14), transparent 55%),
                radial-gradient(ellipse 60% 45% at 80% 20%, rgba(220, 190, 210, 0.1), transparent 50%);
        }
        .wrap { width: 100%; max-width: 400px; }
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }
        .theme-toggle {
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--muted);
            cursor: pointer;
            box-shadow: var(--card-shadow);
        }
        .theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: var(--card-shadow);
        }
        .app-mark {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }
        p.lead {
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            line-height: 1.55;
            margin-bottom: 24px;
        }
        p.lead strong { color: var(--text); font-weight: 600; }
        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: var(--input-bg);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 16px;
        }
        input:focus { outline: none; border-color: var(--accent); }
        button[type="submit"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: #fffdfb;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        button[type="submit"]:hover { background: var(--accent-hover); }
        .err {
            background: color-mix(in srgb, var(--distracting) 12%, transparent);
            border: 1px solid color-mix(in srgb, var(--distracting) 28%, transparent);
            color: var(--distracting);
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .hint {
            margin-top: 20px;
            font-size: 11px;
            font-weight: 500;
            color: var(--muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top-bar">
        <button type="button" class="theme-toggle" id="themeToggle" aria-label="Switch appearance">Dark mode</button>
    </div>
    <div class="card">
        <div class="app-mark">Attention Auditor</div>
        <h1>Sign in</h1>
        <p class="lead">Open the extension popup → copy your <strong>Device ID</strong> → paste it here. Each browser profile has its own dashboard.</p>
        {% if error %}
        <div class="err">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('login') }}">
            <input type="hidden" name="next" value="{{ next }}" />
            <label for="client_token">Device ID (UUID)</label>
            <input type="text" id="client_token" name="client_token" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocomplete="off" spellcheck="false" />
            <button type="submit">View my dashboard</button>
        </form>
        <p class="hint">This sets a session cookie in your browser. Use Log out on the dashboard to switch users.</p>
    </div>
</div>
<script>
(function () {
    var btn = document.getElementById("themeToggle");
    if (!btn) return;
    function isDark() { return document.documentElement.getAttribute("data-theme") === "dark"; }
    function sync() {
        btn.textContent = isDark() ? "Light mode" : "Dark mode";
        btn.setAttribute("aria-label", isDark() ? "Switch to light mode" : "Switch to dark mode");
    }
    sync();
    btn.addEventListener("click", function () {
        var next = isDark() ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("aa-theme", next);
        sync();
    });
})();
</script>
</body>
</html>
